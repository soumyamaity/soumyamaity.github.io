name: Deploy to Github Pages

on:
  push:
    branches:
    - PreProduction

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Site is pure static HTML — no build step needed.
    # Just deploy the repo contents directly to the main branch.
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3.9.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: main
        publish_dir: ./
        exclude_assets: '.github,generate_manifest.py,script.py,read_frontmatter.py,.gitmodules,CLAUDE.md'
